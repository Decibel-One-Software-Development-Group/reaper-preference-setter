name: Build Executables

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: true

  build_macos:
    needs: create_release
    # Both architectures build on macos-14 — Intel build cross-compiles via
    # Rosetta 2 + arch -x86_64. This keeps everything on the plentiful Apple
    # Silicon runner pool. macos-13 (Intel) runners have multi-hour free-tier
    # queue times. Same pattern used by simchronize-server.
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            arch_label: AppleSilicon
          - arch: x86_64
            arch_label: Intel
    runs-on: macos-14

    env:
      DMG: REAPER-Preference-Setter-macOS-${{ matrix.arch_label }}.dmg

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: |
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            arch -x86_64 python3 -m pip install pyinstaller tkinterdnd2
          else
            pip install pyinstaller tkinterdnd2
          fi

      - name: Build .app with PyInstaller
        run: |
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            arch -x86_64 python3 -m PyInstaller --windowed --onedir \
              --name "REAPER Preference Setter" \
              --icon icon.icns \
              --osx-bundle-identifier com.nomismatt.reaper-preference-setter \
              --collect-all tkinterdnd2 \
              --target-architecture x86_64 \
              configure_reaper.py
          else
            pyinstaller --windowed --onedir \
              --name "REAPER Preference Setter" \
              --icon icon.icns \
              --osx-bundle-identifier com.nomismatt.reaper-preference-setter \
              --collect-all tkinterdnd2 \
              --target-architecture arm64 \
              configure_reaper.py
          fi

      - name: Import Apple Certificate
        run: |
          if security list-keychains | grep -q "github_build.keychain"; then
            security delete-keychain github_build.keychain
          fi
          security create-keychain -p "" github_build.keychain
          security default-keychain -s github_build.keychain
          security set-keychain-settings -lut 21600 github_build.keychain
          echo "${{ secrets.APPLE_CERTIFICATE }}" | base64 --decode > apple_certificate.p12
          security import apple_certificate.p12 -k github_build.keychain -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            -t cert -f pkcs12 -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcrun
          security unlock-keychain -p "" github_build.keychain
          security set-key-partition-list -S 'apple-tool:,apple:' -s -k "" github_build.keychain
          security list-keychain -d user -s github_build.keychain 'login-keychain'

      - name: Unlock keychain
        run: |
          security unlock-keychain -p "" github_build.keychain
          security set-key-partition-list -S apple-tool:,apple: -k "" -D "Developer" -t private github_build.keychain

      - name: Codesign .app bundle
        run: |
          APP="dist/REAPER Preference Setter.app"
          # Sign all .so and .dylib files first
          find "${APP}" -iname '*.so' -or -iname '*.dylib' | while read libfile; do
            codesign -s "${{ secrets.APPLE_CERTIFICATE_NAME }}" \
              --entitlements entitlements.plist \
              --deep "${libfile}" \
              --force --timestamp --options runtime
          done
          # Sign the whole .app bundle
          codesign -s "${{ secrets.APPLE_CERTIFICATE_NAME }}" \
            --entitlements entitlements.plist \
            --deep --force --timestamp --options runtime \
            "${APP}"
          codesign --verify --verbose=4 "${APP}"

      - name: Create DMG
        run: |
          brew install create-dmg || true
          max_tries=5
          i=0
          until create-dmg \
            --volname "REAPER Preference Setter" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --app-drop-link 450 185 \
            --hide-extension "REAPER Preference Setter.app" \
            "${DMG}" \
            "dist/REAPER Preference Setter.app"
          do
            if [ $i -eq $max_tries ]; then
              echo "create-dmg failed, falling back to hdiutil"
              hdiutil create -volname "REAPER Preference Setter" \
                -srcfolder "dist/REAPER Preference Setter.app" \
                -ov -format UDZO \
                "${DMG}"
              break
            fi
            i=$((i+1))
          done

      - name: Notarize DMG
        run: |
          xcrun notarytool submit "${DMG}" \
            --apple-id "${{ secrets.APPLE_DEVELOPER_ID_USER }}" \
            --password "${{ secrets.APPLE_DEVELOPER_ID_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_DEVELOPER_ID_TEAM }}" \
            --wait --verbose

      - name: Staple DMG
        run: |
          xcrun stapler staple "${DMG}"
          xcrun stapler validate "${DMG}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            ${{ env.DMG }}

  build_windows:
    needs: create_release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller tkinterdnd2

      - name: Build executable
        run: pyinstaller --windowed --onefile --name "REAPER-Preference-Setter" --icon icon.ico --collect-all tkinterdnd2 configure_reaper.py

      - name: Zip exe with README
        run: Compress-Archive -Path "dist/REAPER-Preference-Setter.exe", "README.md" -DestinationPath "REAPER-Preference-Setter-Windows.zip"
        shell: pwsh

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            REAPER-Preference-Setter-Windows.zip
